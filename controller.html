<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Match Controller</title>
<link rel="stylesheet" href="controller.css">
</head>

<body>

<div id="setupScreen" class="container">

<h1>Match Setup</h1>

<div class="box">

<div class="field">
<label>Liga</label>
<select id="leagueSelect"></select>
</div>

<div class="field">
<label>Heimteam</label>
<select id="homeTeamSelect"></select>
<img id="homeLogoPreview" class="logoPreview">
</div>

<div class="field">
<label>Gastteam</label>
<select id="awayTeamSelect"></select>
<img id="awayLogoPreview" class="logoPreview">
</div>

<button onclick="startMatch()">Spiel starten</button>

</div>

</div>

<div id="controllerScreen" class="container" style="display:none">

<h1>Match Controller</h1>

<div class="box">

<div class="clock" id="liveClock">20:00</div>

<div class="score" id="liveScore">0 : 0</div>

<button onclick="startClock()">Start</button> <button onclick="pauseClock()">Pause</button> <button onclick="resetClock()">Reset</button>

<hr>

<button onclick="score('home',1)">Tor +1 Heim</button> <button onclick="score('home',-1)">Tor -1 Heim</button>

<button onclick="score('away',1)">Tor +1 Gast</button> <button onclick="score('away',-1)">Tor -1 Gast</button>

</div>

</div>

<script src="controller.js"></script>

</body>
</html>
