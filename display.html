<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Match Display</title>
<link rel="stylesheet" href="display.css">
</head>

<body>

<div class="scoreboard">

<div class="header">

<div class="team home">

<img id="homeLogo" class="teamLogo">

<div class="teamName" id="homeName">Home</div>

<div class="score" id="homeScore">0</div>

<div class="powerplayBar" id="homePowerplay"></div>

<div class="penalties" id="homePenalties"></div>

</div>

<div class="center">

<div class="period">
PERIOD <span id="period">1</span>
</div>

<div class="timeout" id="timeoutDisplay"></div>

<div class="clock" id="clock">20:00</div>

</div>

<div class="team away">

<img id="awayLogo" class="teamLogo">

<div class="teamName" id="awayName">Away</div>

<div class="score" id="awayScore">0</div>

<div class="powerplayBar" id="awayPowerplay"></div>

<div class="penalties" id="awayPenalties"></div>

</div>

</div>

</div>

<script src="display.js"></script>

</body>
</html>
